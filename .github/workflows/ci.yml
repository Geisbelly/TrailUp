name: CI

on:
  push:
    branches: [main]
  pull_request:

# cancela execuções antigas do mesmo ref quando há um novo push
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Detecta quais serviços mudaram para rodar apenas o necessário.
  changes:
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      microservice: ${{ steps.filter.outputs.microservice }}
      frontend: ${{ steps.filter.outputs.frontend }}
      mobile: ${{ steps.filter.outputs.mobile }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'api/**'
            microservice:
              - 'microservice/**'
            frontend:
              - 'frontend/**'
            mobile:
              - 'mobile/**'

  api:
    needs: changes
    if: ${{ needs.changes.outputs.api == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: api/requirements.txt
      - name: Instala ffmpeg (moviepy/gTTS)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends ffmpeg
      - name: Instala dependências
        run: pip install -r requirements.txt
      - name: Testes (pytest)
        run: pytest

  microservice:
    needs: changes
    if: ${{ needs.changes.outputs.microservice == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: microservice
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: microservice/package-lock.json
      - run: npm ci
      - name: Type-check (tsc)
        run: npm run lint
      - name: Testes
        run: npm test

  frontend:
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Lint (eslint)
        run: npm run lint
      - name: Build
        run: npm run build

  mobile:
    needs: changes
    if: ${{ needs.changes.outputs.mobile == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: mobile/package-lock.json
      - run: npm ci
      - name: Lint (expo)
        run: npm run lint
